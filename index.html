<title>수련회 영성지도 시스템</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nanum+Myeongjo:wght@400;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --p1:#6C3CE1;--p2:#8B5CF6;--p3:#C4B5FD;--p4:#EDE9FE;
  --a1:#F59E0B;--a2:#FCD34D;--a3:#FEF3C7;
  --t1:#10B981;--t2:#34D399;--t3:#D1FAE5;
  --r1:#EF4444;--r2:#FCA5A5;
  --b1:#3B82F6;--b2:#93C5FD;--b3:#DBEAFE;
  --bg:#F8F7FF;--card:#FFFFFF;--text:#1E1B4B;--text2:#6B7280;
  --border:rgba(108,60,225,0.12);
  --shadow:0 4px 20px rgba(108,60,225,0.1);
  --shadow2:0 8px 32px rgba(108,60,225,0.18);
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── 카드 ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:1.25rem;margin-bottom:1rem;box-shadow:var(--shadow)}
.card-title{font-size:17px;font-weight:800;color:var(--p1);margin-bottom:.75rem}
.card-sub{font-size:13px;color:var(--text2);margin-bottom:1rem}
label{display:block;font-size:12px;font-weight:700;color:var(--p2);margin-bottom:.4rem;letter-spacing:.03em}
.form-row{margin-bottom:.9rem}
input[type=text],input[type=date],textarea,select{
  width:100%;padding:.75rem 1rem;border:2px solid var(--border);border-radius:14px;
  font-size:14px;font-family:'Nunito',sans-serif;background:#FAFAFA;
  color:var(--text);resize:vertical;outline:none;transition:all .2s}
input:focus,textarea:focus,select:focus{border-color:var(--p2);background:#fff;box-shadow:0 0 0 4px rgba(139,92,246,.12)}
textarea{min-height:80px}

/* ── 버튼 ── */
.btn{padding:.65rem 1.25rem;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:'Nunito',sans-serif;transition:all .18s;letter-spacing:.02em}
.btn-green{background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;box-shadow:0 4px 14px rgba(108,60,225,.35)}
.btn-green:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(108,60,225,.45)}
.btn-green:active{transform:scale(.97)}
.btn-sage{background:var(--p4);color:var(--p1);border:1.5px solid var(--p3)}
.btn-sage:hover{background:var(--p3)}
.btn-gold{background:linear-gradient(135deg,var(--a1),#F97316);color:#fff;box-shadow:0 4px 14px rgba(245,158,11,.3)}
.btn-gold:hover{transform:translateY(-1px)}
.btn-full{width:100%;padding:.85rem;font-size:15px;border-radius:50px}
.divider{height:2px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:1rem 0}
.section-label{font-size:11px;font-weight:800;color:var(--p2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.5rem}

/* ── 프로그레스바 ── */
.pbar{height:10px;background:#EEE;border-radius:50px;overflow:hidden;margin:.4rem 0}
.pbar-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,var(--t2),var(--t1));transition:width .5s cubic-bezier(.34,1.56,.64,1)}

/* ── 스탯 ── */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1rem}
.stat-box{background:linear-gradient(135deg,var(--p4),#fff);border-radius:16px;padding:.85rem;text-align:center;border:1.5px solid var(--p3)}
.stat-num{font-size:24px;font-weight:900;color:var(--p1)}
.stat-lbl{font-size:10px;color:var(--p2);margin-top:.2rem;font-weight:700}

/* ── 토스트 ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;
  padding:.65rem 1.5rem;border-radius:50px;font-size:13px;font-weight:700;
  z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;
  box-shadow:0 8px 24px rgba(108,60,225,.4)}
.toast.show{opacity:1}
.empty{text-align:center;padding:2rem;color:#B0B0C0;font-size:14px;line-height:1.8}

/* ── SPLASH ── */
#splash{
  background:linear-gradient(145deg,#1E0A5E 0%,#4C1D95 35%,#7C3AED 70%,#A78BFA 100%);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2rem;text-align:center;position:relative;overflow:hidden}
#splash::before{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='1.5' fill='rgba(255,255,255,0.08)'/%3E%3C/svg%3E");
  pointer-events:none}
.sp-icon{width:88px;height:88px;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);
  border-radius:28px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;
  font-size:40px;box-shadow:0 8px 32px rgba(0,0,0,.2);backdrop-filter:blur(10px)}
.sp-title{font-size:30px;font-weight:900;color:#fff;line-height:1.35;margin-bottom:.5rem;letter-spacing:-.02em}
.sp-sub{font-size:13px;color:rgba(255,255,255,.65);margin-bottom:2.5rem}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;width:100%;max-width:380px;margin-bottom:1.5rem}
.role-card{
  background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.2);
  border-radius:20px;padding:1.5rem 1rem;cursor:pointer;transition:all .22s;text-align:center;
  backdrop-filter:blur(10px)}
.role-card:hover{background:rgba(255,255,255,.2);transform:translateY(-3px) scale(1.02);box-shadow:0 12px 32px rgba(0,0,0,.2)}
.role-card.on{background:rgba(255,255,255,.22);border-color:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.3)}
.role-emoji{font-size:36px;display:block;margin-bottom:.75rem}
.role-name{font-size:17px;font-weight:800;color:#fff;margin-bottom:.3rem}
.role-desc{font-size:11px;color:rgba(255,255,255,.6)}
.sp-btn{background:#fff;color:var(--p1);border:none;padding:.95rem 2.5rem;border-radius:50px;
  font-size:16px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s;
  box-shadow:0 8px 24px rgba(0,0,0,.2);letter-spacing:.02em}
.sp-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,.3)}
.sp-btn:active{transform:scale(.97)}
.sp-btn:disabled{opacity:.45;pointer-events:none}

/* ── 인증 화면 ── */
.auth-screen{
  background:linear-gradient(145deg,#1E0A5E 0%,#4C1D95 35%,#7C3AED 70%,#A78BFA 100%);
  min-height:100vh;display:none;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
.auth-box{
  background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.22);
  border-radius:28px;padding:2rem 1.75rem;width:100%;max-width:340px;text-align:center;
  backdrop-filter:blur(16px)}
.auth-icon{font-size:44px;margin-bottom:1rem}
.auth-title{font-size:22px;font-weight:900;color:#fff;margin-bottom:.35rem}
.auth-sub{font-size:12px;color:rgba(255,255,255,.6);margin-bottom:1.75rem}
.auth-input{background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.25);color:#fff;
  border-radius:14px;padding:.8rem 1rem;font-size:16px;text-align:center;
  font-family:'Nunito',sans-serif;font-weight:700;outline:none;width:100%;margin-bottom:.75rem}
.auth-input::placeholder{color:rgba(255,255,255,.45)}
.auth-input:focus{border-color:rgba(255,255,255,.7);background:rgba(255,255,255,.25)}
.auth-select{background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.25);color:#fff;
  border-radius:14px;padding:.8rem 1rem;font-size:14px;font-family:'Nunito',sans-serif;font-weight:700;
  outline:none;width:100%;margin-bottom:1.25rem;-webkit-appearance:none;appearance:none}
.auth-select option{background:#4C1D95;color:#fff}
.auth-btn{background:#fff;color:var(--p1);border:none;width:100%;padding:.9rem;border-radius:50px;
  font-size:16px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s;
  box-shadow:0 6px 20px rgba(0,0,0,.15)}
.auth-btn:hover{transform:translateY(-1px);box-shadow:0 10px 28px rgba(0,0,0,.2)}
.auth-back{background:none;border:2px solid rgba(255,255,255,.25);color:rgba(255,255,255,.7);
  padding:.4rem 1.1rem;border-radius:50px;font-size:12px;cursor:pointer;
  font-family:'Nunito',sans-serif;font-weight:700;margin-top:.75rem;display:inline-block;transition:all .2s}
.auth-back:hover{background:rgba(255,255,255,.1)}

/* ── 비밀번호 패드 ── */
.pw-dots{display:flex;justify-content:center;gap:12px;margin-bottom:1.75rem}
.pw-dot{width:18px;height:18px;border-radius:50%;border:2.5px solid rgba(255,255,255,.3);transition:all .2s}
.pw-dot.on{background:#fff;border-color:#fff;transform:scale(1.15);box-shadow:0 0 10px rgba(255,255,255,.5)}
.pw-dot.err{background:#FF6B6B;border-color:#FF6B6B;animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-bottom:1rem}
.num-btn{background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.2);border-radius:16px;
  padding:.9rem;font-size:24px;font-weight:800;color:#fff;cursor:pointer;transition:all .15s;
  font-family:'Nunito',sans-serif;aspect-ratio:1;display:flex;align-items:center;justify-content:center}
.num-btn:hover{background:rgba(255,255,255,.25);transform:scale(1.06)}
.num-btn:active{transform:scale(.93)}
.num-btn.empty{background:transparent;border-color:transparent;pointer-events:none}
.pw-err{font-size:12px;color:#FF9999;min-height:18px;margin-bottom:.5rem;font-weight:700}
.pw-hint{font-size:11px;color:rgba(255,255,255,.35);margin-top:.75rem}

/* ── 메인 앱 ── */
#main-app{flex-direction:column;min-height:100vh;display:none}
header{
  background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;
  padding:.9rem 1.25rem;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(108,60,225,.3)}
.h-logo{font-size:17px;font-weight:900;letter-spacing:-.02em}
.h-badge{background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.3);
  border-radius:50px;padding:.25rem .9rem;font-size:12px;color:#fff;font-weight:700}
.h-back{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);
  color:#fff;padding:.3rem .85rem;border-radius:50px;font-size:12px;cursor:pointer;
  font-family:'Nunito',sans-serif;font-weight:700;transition:all .2s}
.h-back:hover{background:rgba(255,255,255,.25)}

/* ── 탭 네비 ── */
nav{background:#fff;border-bottom:2px solid var(--border);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
.nav-tab{flex:1;min-width:62px;padding:.65rem .2rem;text-align:center;font-size:10px;
  color:#B0B0C0;border-bottom:3px solid transparent;cursor:pointer;transition:all .2s;
  white-space:nowrap;font-weight:700}
.nav-tab.on{color:var(--p1);border-bottom-color:var(--p1);background:var(--p4)}
.nav-icon{font-size:16px;display:block;margin-bottom:2px}
main{flex:1;padding:1rem;max-width:700px;margin:0 auto;width:100%}

/* ── 주간 QT 달력 ── */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:.4rem;margin:1rem 0}
.day{aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;cursor:pointer;border:2px solid transparent;transition:all .2s}
.day-done{background:linear-gradient(135deg,var(--t2),var(--t1));color:#fff;box-shadow:0 3px 10px rgba(16,185,129,.3)}
.day-none{background:#F0F0F8;color:#C0C0D0}
.day-today{background:linear-gradient(135deg,var(--a2),var(--a1));color:#fff;box-shadow:0 3px 10px rgba(245,158,11,.3)}

/* ── QT 아이템 ── */
.qt-item{border-left:4px solid var(--p2);padding:.8rem 1rem;margin-bottom:.75rem;
  background:linear-gradient(135deg,var(--p4),#fff);border-radius:0 14px 14px 0}
.qt-date{font-size:11px;color:var(--text2);margin-bottom:.2rem;font-weight:700}
.qt-verse{font-size:13px;font-weight:800;color:var(--p1);margin-bottom:.25rem}
.qt-text{font-size:13px;color:#444;line-height:1.6}
.qt-apply{font-size:12px;color:var(--t1);margin-top:.3rem;font-weight:700}

/* ── 기도 아이템 ── */
.pray-item{display:flex;align-items:flex-start;gap:.75rem;padding:.75rem;
  border:2px solid var(--border);border-radius:14px;margin-bottom:.6rem;
  background:linear-gradient(135deg,#fff,var(--p4))}
.share-on{background:linear-gradient(135deg,var(--t1),var(--t2));color:#fff;font-size:10px;
  padding:.2rem .6rem;border-radius:50px;font-weight:800;display:inline-block;margin-top:.2rem}
.share-off{background:#EEE;color:#999;font-size:10px;padding:.2rem .6rem;border-radius:50px;
  font-weight:700;display:inline-block;margin-top:.2rem}

/* ── 메시지 ── */
.msg-item{padding:.8rem;border-radius:14px;margin-bottom:.6rem;font-size:13px}
.msg-recv{background:linear-gradient(135deg,var(--a3),#FFF9F0)}
.msg-send{background:linear-gradient(135deg,var(--p4),#F0EEFF)}
.msg-meta{font-size:11px;color:var(--p2);margin-bottom:.25rem;font-weight:700}
.msg-text{color:var(--text);line-height:1.6;font-weight:600}

/* ── 학생 목록 ── */
.stu-item{display:flex;align-items:center;gap:.75rem;padding:.8rem;
  border:2px solid var(--border);border-radius:16px;margin-bottom:.6rem;
  background:#fff;transition:all .2s}
.stu-item:hover{border-color:var(--p3);background:var(--p4)}
.stu-av{width:42px;height:42px;border-radius:14px;
  background:linear-gradient(135deg,var(--p3),var(--p2));
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}

/* ── 말씀 배너 ── */
.verse-banner{background:linear-gradient(135deg,#1E0A5E,var(--p1),var(--p2));
  border-radius:20px;padding:1.5rem;margin-bottom:1rem;text-align:center;color:#fff;
  position:relative;overflow:hidden}
.verse-banner::after{content:'✨';position:absolute;right:16px;top:16px;font-size:20px;opacity:.5}
.verse-text{font-family:'Nanum Myeongjo',serif;font-size:15px;line-height:1.8;margin-bottom:.4rem}

<script>
const TEACHER_PW='123456';
// ★ GAS API URL (본인 배포 URL로 교체)
const GAS_URL = 'https://script.google.com/macros/s/AKfycby3fpINWwzoCGrcDdDXAane0JuhAT20T1wNT90PyVjv8FxUi-25C8AT0riDnwokVt2OFg/exec';

const EMOJIS=[
  {em:'🥶',lv:'아주 멀다',val:1,color:'#A8D5E2'},
  {em:'😶',lv:'조금 멀다',val:2,color:'#7DC09B'},
  {em:'🙂',lv:'보통',val:3,color:'#4A9B5E'},
  {em:'😊',lv:'가깝다',val:4,color:'#2D7A3A'},
  {em:'🔥',lv:'아주 가깝다',val:5,color:'#1A5228'},
];

let role=null,me={이름:'',학년:'',id:''};
let pwBuf='',pwLock=false,pwFail=0;
let selectedTemp=null;
const C={qt:[],적용점:[],기도제목:[],메시지:[],신앙온도:[],신앙일기:[],공감QT:[],중보기도:[],삼줄기도:[]};
const W=[0,0,0,0,0,0,0];

// ── 공감 QT 말씀 목록 (교사가 앱 내에서 추가 가능) ──
const VERSES=[
  {ref:'마 6:33',text:'너희는 먼저 그의 나라와 그의 의를 구하라 그리하면 이 모든 것을 너희에게 더하시리라',choices:[{em:'🎯',label:'도전이 된다'},{em:'🤔',label:'잘 모르겠다'},{em:'😌',label:'위로가 된다'},{em:'😟',label:'실천이 어렵다'}]},
  {ref:'요 15:5',text:'나는 포도나무요 너희는 가지라 그가 내 안에, 내가 그 안에 거하면 사람이 열매를 많이 맺나니 나를 떠나서는 너희가 아무것도 할 수 없음이라',choices:[{em:'🌿',label:'연결감이 느껴진다'},{em:'💪',label:'힘이 된다'},{em:'😶',label:'무감각하다'},{em:'😢',label:'나는 멀리 있다'}]},
  {ref:'시 23:1',text:'여호와는 나의 목자시니 내게 부족함이 없으리로다',choices:[{em:'🕊️',label:'평안하다'},{em:'🙏',label:'감사하다'},{em:'😶',label:'잘 모르겠다'},{em:'😔',label:'부족함이 많다'}]},
  {ref:'빌 4:13',text:'내게 능력 주시는 자 안에서 내가 모든 것을 할 수 있느니라',choices:[{em:'💪',label:'용기가 생긴다'},{em:'😊',label:'힘이 된다'},{em:'🤷',label:'와닿지 않는다'},{em:'😓',label:'지금은 힘들다'}]},
  {ref:'롬 8:28',text:'우리가 알거니와 하나님을 사랑하는 자 곧 그의 뜻대로 부르심을 입은 자들에게는 모든 것이 합력하여 선을 이루느니라',choices:[{em:'🌈',label:'희망이 된다'},{em:'🙏',label:'감사하다'},{em:'😤',label:'믿기 어렵다'},{em:'😢',label:'지금은 모르겠다'}]},
  {ref:'잠 3:5-6',text:'너는 마음을 다하여 여호와를 신뢰하고 네 명철을 의지하지 말라 너는 범사에 그를 인정하라 그리하면 네 길을 지도하시리라',choices:[{em:'✨',label:'신뢰하고 싶다'},{em:'😰',label:'불안하다'},{em:'🤝',label:'의지하겠다'},{em:'😶',label:'아직 어렵다'}]},
  {ref:'렘 29:11',text:'여호와의 말씀이니라 너희를 향한 나의 생각을 내가 아나니 평안이요 재앙이 아니니라 너희에게 미래와 희망을 주는 것이니라',choices:[{em:'🌟',label:'소망이 생긴다'},{em:'😌',label:'안심이 된다'},{em:'🤔',label:'믿어지지 않는다'},{em:'😢',label:'내 미래가 걱정된다'}]},
  {ref:'마 11:28',text:'수고하고 무거운 짐 진 자들아 다 내게로 오라 내가 너희를 쉬게 하리라',choices:[{em:'😭',label:'지금 꼭 필요하다'},{em:'🤗',label:'따뜻하다'},{em:'🏃',label:'가야겠다'},{em:'😶',label:'잘 모르겠다'}]},
];
let currentVerseIdx=0;
let selectedChoice=null;

async function gasPost(p){
  try{
    var url=GAS_URL+'?action=save&data='+encodeURIComponent(JSON.stringify(p));
    var r=await fetch(url);
    var t=await r.text();
    try{return JSON.parse(t);}catch(x){return{ok:true};}
  }catch(e){console.error('gasPost err',e);return{ok:false};}
}
async function gasGet(type,id=''){try{let url=GAS_URL+'?type='+encodeURIComponent(type);if(id)url+='&id='+encodeURIComponent(id);const r=await fetch(url);if(!r.ok)return[];const j=await r.json();return j.ok?j.data:[];}catch(e){console.error('GET err',e);return[];}}

function pickRole(r){role=r;document.getElementById('rc-s').classList.toggle('on',r==='student');document.getElementById('rc-t').classList.toggle('on',r==='teacher');document.getElementById('sp-start').disabled=false;}
function startFlow(){if(!role)return;hide('splash');if(role==='student')showEl('name-screen');else showEl('pw-screen');}
function enterStudent(){
  const n=document.getElementById('ns-name').value.trim(),g=document.getElementById('ns-grade').value;
  if(!n){alert('이름을 입력해주세요');return;}if(!g){alert('학년을 선택해주세요');return;}
  me={이름:n,학년:g,id:n+'_'+g};
  gasPost({type:'학생등록',학생id:me.id,이름:me.이름,학년:me.학년});
  hide('name-screen');launch();
}
function np(n){if(pwLock||pwBuf.length>=6)return;pwBuf+=n;dots();if(pwBuf.length===6)setTimeout(checkPw,120);}
function nd(){if(pwLock)return;pwBuf=pwBuf.slice(0,-1);dots();setE('');}
function dots(){for(let i=0;i<6;i++){const d=document.getElementById('d'+i);d.classList.toggle('on',i<pwBuf.length);d.classList.remove('err');}}
function setE(m){document.getElementById('pw-err').textContent=m;}
function checkPw(){
  if(pwBuf===TEACHER_PW){setE('');hide('pw-screen');launch();}
  else{pwLock=true;pwFail++;const left=5-pwFail;
    if(left>0)setE('비밀번호가 틀렸습니다. ('+left+'회 남음)');
    else{setE('시도 횟수 초과.');setTimeout(()=>{goSplash();pwFail=0;},2000);return;}
    for(let i=0;i<6;i++){const d=document.getElementById('d'+i);d.classList.remove('on');d.classList.add('err');}
    setTimeout(()=>{for(let i=0;i<6;i++)document.getElementById('d'+i).classList.remove('err');pwBuf='';dots();pwLock=false;},600);}
}
async function launch(){
  const ma=document.getElementById('main-app');ma.style.display='flex';ma.style.flexDirection='column';
  document.getElementById('h-badge').textContent=role==='student'?me.이름+' ('+me.학년+')':'교사 모드 🔐';
  if(role==='student'){
    const[t,d,p3,eq,ap,q,pr,ms]=await Promise.all([
      gasGet('신앙온도',me.id),gasGet('신앙일기',me.id),
      gasGet('삼줄기도',me.id),gasGet('공감QT',me.id),
      gasGet('적용점',me.id),gasGet('QT',me.id),
      gasGet('기도제목',me.id),gasGet('메시지')
    ]);
    C.신앙온도=t;C.신앙일기=d;C.삼줄기도=p3;
    C.공감QT=eq;C.적용점=ap;C.qt=q;C.기도제목=pr;
    C.메시지=ms.filter(m=>m.수신자===me.이름||m.발신자===me.이름||m.수신자==='전체');
  }
  buildNav();showTab(0);
}

// ★ 학생 탭에 신앙 온도계 + 신앙일기 추가
const ST=[
  {icon:'🌡️',label:'신앙온도계',fn:sTemp},
  {icon:'📔',label:'신앙일기',fn:sDiary},
  {icon:'🕊️',label:'3줄 기도',fn:sPrayer3},
  {icon:'✝️',label:'공감QT',fn:sEmpathyQT},
  {icon:'🏕️',label:'나의결단',fn:sApply},
  {icon:'💬',label:'메시지',fn:sMsg},
];
const TT=[{icon:'📋',label:'오늘의 기록',fn:tToday},
  {icon:'🌡️',label:'온도 현황',fn:tTemp},
  {icon:'📔',label:'일기 현황',fn:tDiary},
  {icon:'🕊️',label:'기도 현황',fn:tPrayer3},
  {icon:'✝️',label:'공감QT',fn:tEmpathyQT},
  {icon:'👥',label:'학생 현황',fn:tStudents},
  {icon:'📖',label:'QT 현황',fn:tQT},
  {icon:'💌',label:'메시지',fn:tMsg},
  {icon:'📊',label:'리포트',fn:tReport},
];
function buildNav(){const tabs=role==='student'?ST:TT;document.getElementById('nav').innerHTML=tabs.map((t,i)=>'<div class="nav-tab" onclick="showTab('+i+')"><span class="nav-icon">'+t.icon+'</span>'+t.label+'</div>').join('');}
function showTab(i){document.querySelectorAll('.nav-tab').forEach((t,j)=>t.classList.toggle('on',i===j));const tabs=role==='student'?ST:TT;const mc=document.getElementById('mc');mc.innerHTML='';tabs[i].fn(mc);}

// ════════════════════════════════════════════════════
//  ★ 학생 탭 2: 신앙 온도계 (기존)
//  POST → { type:'신앙온도', 학생id, 이름, 날짜, 온도, 이모지, 한마디 }
// ════════════════════════════════════════════════════
function sTemp(c){
  const today=toStr();
  const todayLog=C.신앙온도.find(r=>r.날짜===today);
  const days=['일','월','화','수','목','금','토'];
  const td=new Date().getDay();

  // 7일치 날짜 계산
  const week=[];
  for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);week.push(d.toISOString().split('T')[0]);}

  const weekCells=week.map((d,i)=>{
    const log=C.신앙온도.find(r=>r.날짜===d);
    const dayName=days[new Date(d+'T12:00:00').getDay()];
    const isToday=d===today;
    if(log)return'<div class="wt-cell has'+(isToday?' today-cell':'')+'"><span class="wt-em">'+log.이모지+'</span><span class="wt-day">'+dayName+'</span></div>';
    return'<div class="wt-cell'+(isToday?' today-cell':'')+'"><span class="wt-day">'+dayName+'</span></div>';
  }).join('');

  const needleLeft=selectedTemp?((selectedTemp-1)/4*90+5)+'%':todayLog?((+todayLog.온도-1)/4*90+5)+'%':'52%';

  c.innerHTML=`
  <div class="card">
    <div class="thermo-wrap">
      <div class="thermo-title">🌡️ 오늘 신앙 온도는?</div>
      <div class="thermo-sub">지금 하나님과 얼마나 가깝게 느껴지나요?</div>
      <div class="emoji-row" id="emoji-row">
        ${EMOJIS.map(e=>'<div class="emoji-btn'+(selectedTemp===e.val||(todayLog&&+todayLog.온도===e.val&&!selectedTemp)?' sel':'')+'" onclick="pickTemp('+e.val+')" title="'+e.lv+'"><span class="em">'+e.em+'</span><span class="lv">'+e.lv+'</span></div>').join('')}
      </div>
      <div class="thermo-bar-wrap">
        <div class="thermo-bar">
          <div class="thermo-needle" id="thermo-needle" style="left:${needleLeft}"></div>
        </div>
        <div class="thermo-labels"><span>🥶 멀다</span><span>🔥 가깝다</span></div>
      </div>
    </div>
    ${todayLog&&!selectedTemp?`
    <div class="today-log">
      <div class="today-big">${todayLog.이모지}</div>
      <div class="today-label">오늘의 온도 · ${EMOJIS.find(e=>e.val==+todayLog.온도)?.lv||''}</div>
      ${todayLog.한마디?'<div class="today-comment">"'+todayLog.한마디+'"</div>':''}
    </div>`:''}
    <div class="form-row" style="margin-top:.75rem">
      <label>한 마디 (선택)</label>
      <input type="text" id="temp-comment" placeholder="오늘 이렇게 느낀 이유가 있다면..." maxlength="50" value="${todayLog?.한마디||''}">
    </div>
    <button class="btn btn-green btn-full" onclick="saveTemp()" id="temp-save-btn">
      ${todayLog?'오늘 온도 수정하기':'오늘 온도 저장하기'}
    </button>
  </div>

  <div class="card">
    <div class="card-title">📅 이번 주 온도 기록</div>
    <div class="week-thermo">${weekCells}</div>
  </div>

  <div class="card">
    <div class="card-title">📈 최근 기록</div>
    ${C.신앙온도.length
      ?C.신앙온도.slice().reverse().slice(0,7).map(r=>'<div class="temp-history-item"><span class="thi-em">'+r.이모지+'</span><div class="thi-info"><div class="thi-date">'+r.날짜+' · '+EMOJIS.find(e=>e.val==+r.온도)?.lv+'</div>'+(r.한마디?'<div class="thi-comment">"'+r.한마디+'"</div>':'')+'<div class="thi-bar" style="width:'+(+r.온도/5*100)+'%;max-width:100%"></div></div></div>').join('')
      :'<div class="empty">아직 기록이 없어요<br>오늘 처음으로 온도를 기록해보세요 🌡️</div>'}
  </div>`;
}

function pickTemp(val){
  selectedTemp=val;
  document.querySelectorAll('.emoji-btn').forEach((b,i)=>b.classList.toggle('sel',EMOJIS[i].val===val));
  const needle=document.getElementById('thermo-needle');
  if(needle)needle.style.left=((val-1)/4*90+5)+'%';
}

async function saveTemp(){
  if(!selectedTemp){toast('이모지를 먼저 선택해주세요');return;}
  const emoji=EMOJIS.find(e=>e.val===selectedTemp);
  const comment=document.getElementById('temp-comment').value.trim();
  const today=toStr();
  const record={날짜:today,온도:selectedTemp,이모지:emoji.em,한마디:comment};

  // 로컬 캐시 업데이트 (오늘 기록 있으면 교체)
  const idx=C.신앙온도.findIndex(r=>r.날짜===today);
  if(idx>=0)C.신앙온도[idx]={...C.신앙온도[idx],...record};
  else C.신앙온도.push(record);

  // GAS 저장: [신앙온도] 학생id | 이름 | 날짜 | 온도 | 이모지 | 한마디
  await gasPost({type:'신앙온도',학생id:me.id,이름:me.이름,...record});
  selectedTemp=null;
  toast('오늘 신앙 온도가 저장되었습니다 '+emoji.em);
  sTemp(document.getElementById('mc'));
}

// ════════════════════════════════════════════════════

// ════════════════════════════════════════════════════
function sDiary(c){
  const today=toStr();
  const todayEntry=C.신앙일기.find(r=>r.날짜===today);

  // 7일 스트릭 계산
  const week=[];
  const days=['일','월','화','수','목','금','토'];
  for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);week.push(d.toISOString().split('T')[0]);}
  const streakCells=week.map(d=>{
    const has=C.신앙일기.find(r=>r.날짜===d);
    const dayName=days[new Date(d+'T12:00:00').getDay()];
    const isToday=d===today;
    if(has)return'<div class="streak-cell sc-done">'+dayName+'</div>';
    if(isToday)return'<div class="streak-cell sc-today">'+dayName+'</div>';
    return'<div class="streak-cell sc-none">'+dayName+'</div>';
  }).join('');

  const todayBanner = todayEntry ? `
    <div class="diary-today-banner diary-saved">
      <div class="diary-saved-head">✅ 오늘의 신앙 일기를 작성했어요!</div>
      <div class="diary-entry-row"><span class="diary-entry-icon">🌿</span><div><div class="diary-entry-cat ec1">느낀 순간</div><div class="diary-entry-text">${todayEntry.느낀순간}</div></div></div>
      <div class="diary-entry-row" style="margin-top:.4rem"><span class="diary-entry-icon">🙏</span><div><div class="diary-entry-cat ec2">고백</div><div class="diary-entry-text">${todayEntry.고백}</div></div></div>
      <div class="diary-entry-row" style="margin-top:.4rem"><span class="diary-entry-icon">⭐</span><div><div class="diary-entry-cat ec3">내일의 소망</div><div class="diary-entry-text">${todayEntry.바라는것}</div></div></div>
      <div style="margin-top:.75rem;font-size:12px;color:#0F6E56">수정하려면 아래에 다시 작성하세요</div>
    </div>` : '';

  c.innerHTML=`
  <div class="card">

async function saveDiary(){
  const q1=document.getElementById('dq1').value.trim();

  const today=toStr();
  const entry={날짜:today, 느낀순간:q1, 고백:q2, 바라는것:q3};

  // 로컬 캐시 업데이트
  const idx=C.신앙일기.findIndex(r=>r.날짜===today);
  if(idx>=0) C.신앙일기[idx]={...C.신앙일기[idx],...entry};

}

//  POST → { type:'공감QT', 학생id, 이름, 날짜, 말씀, 말씀구절, 선택, 한마디 }
// ════════════════════════════════════════════════════
function sEmpathyQT(c){
  const v=VERSES[currentVerseIdx];
  const today=toStr();
  const todayLog=C.공감QT.find(r=>r.날짜===today&&r.말씀구절===v.ref);

  // 이번 주 참여 현황 (날짜별 1건 이상)
  const week=[];
  const dayNames=['일','월','화','수','목','금','토'];
  for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);week.push(d.toISOString().split('T')[0]);}
  const streakCells=week.map(d=>{
    const has=C.공감QT.find(r=>r.날짜===d);
    const dn=dayNames[new Date(d+'T12:00:00').getDay()];
    if(has)return'<div class="streak-cell sc-done">'+dn+'</div>';
    if(d===today)return'<div class="streak-cell sc-today">'+dn+'</div>';
    return'<div class="streak-cell sc-none">'+dn+'</div>';
  }).join('');

  const choiceColors=['#E1F5EE','#EEEDFE','#FAEEDA','#FAECE7'];
  const textColors=['#085041','#3C3489','#633806','#712B13'];

  c.innerHTML=`
  <div class="card">
    <div style="font-size:11px;color:var(--brown);font-weight:600;letter-spacing:.05em;margin-bottom:.6rem">이번 주 참여</div>
    <div class="streak-row" style="margin-bottom:1.25rem">${streakCells}</div>

    <div class="eqt-verse-card">
      <div class="eqt-verse-ref">📖 ${v.ref}</div>
      <div class="eqt-verse-text">"${v.text}"</div>
      <div class="eqt-verse-nav">
        <button class="eqt-nav-btn" onclick="changeVerse(-1)">← 이전</button>
        <span class="eqt-verse-idx">${currentVerseIdx+1} / ${VERSES.length}</span>
        <button class="eqt-nav-btn" onclick="changeVerse(1)">다음 →</button>
      </div>
    </div>

    ${todayLog&&!selectedChoice?`
    <div class="eqt-done-banner">
      <div class="eqt-done-em">${v.choices.find(ch=>ch.label===todayLog.선택)?.em||'✅'}</div>
      <div>
        <div class="eqt-done-label">오늘 이 말씀에 이렇게 응답했어요</div>
        <div class="eqt-done-sel">${todayLog.선택}</div>
        ${todayLog.한마디?'<div class="eqt-done-comment">"'+todayLog.한마디+'"</div>':''}
        <div style="margin-top:.4rem;font-size:11px;color:#1D9E75">다시 선택하면 오늘 응답이 수정돼요</div>
      </div>
    </div>`:''}

    <div style="font-size:13px;color:#555;text-align:center;margin-bottom:.75rem">이 말씀이 오늘 나에게 어떻게 느껴지나요?</div>
    <div class="eqt-choices" id="eqt-choices">
      ${v.choices.map((ch,i)=>`
      <div class="eqt-choice${selectedChoice===ch.label||(todayLog&&todayLog.선택===ch.label&&!selectedChoice)?' sel':''}"
           style="${selectedChoice===ch.label||(todayLog&&todayLog.선택===ch.label&&!selectedChoice)?'background:'+choiceColors[i]+';border-color:'+textColors[i]+';color:'+textColors[i]:''}"
           onclick="pickChoice('${ch.label}',${i})">
        <span class="eqt-choice-em">${ch.em}</span>
        ${ch.label}
      </div>`).join('')}
    </div>

    <div class="form-row" style="margin-top:.25rem">
      <label>한 마디 (선택)</label>
      <input type="text" id="eqt-comment" placeholder="이 말씀을 읽고 떠오른 생각을 한 마디로..." maxlength="60" value="${todayLog?.한마디||''}">
    </div>
    <button class="btn btn-green btn-full" onclick="saveEmpathyQT()">
      ${todayLog?'오늘 응답 수정하기':'응답 저장하기'}
    </button>
  </div>

  <div class="card">
    <div class="card-title">📋 나의 공감 QT 기록</div>
    ${C.공감QT.length
      ?C.공감QT.slice().reverse().map(r=>{
          const vd=VERSES.find(x=>x.ref===r.말씀구절)||{choices:[]};
          const ch=vd.choices.find(x=>x.label===r.선택);
          const idx=vd.choices.indexOf(ch);
          const bg=idx>=0?choiceColors[idx]:'#E8F0E0';
          const tc=idx>=0?textColors[idx]:'#2D5016';
          return'<div class="eqt-history-item"><div class="eqt-hi-head"><span class="eqt-hi-date">'+r.날짜+'</span><span class="eqt-hi-sel" style="background:'+bg+';color:'+tc+'">'+r.선택+'</span></div><div class="eqt-hi-verse">📖 '+r.말씀구절+' "'+r.말씀.slice(0,30)+(r.말씀.length>30?'...':'')+'"</div>'+(r.한마디?'<div class="eqt-hi-comment">"'+r.한마디+'"</div>':'')+'</div>'}).join('')
      :'<div class="empty">아직 공감 QT 기록이 없어요<br>위 말씀에 응답해보세요 ✝️</div>'}
  </div>`;
}

function changeVerse(dir){
  currentVerseIdx=(currentVerseIdx+dir+VERSES.length)%VERSES.length;
  selectedChoice=null;
  sEmpathyQT(document.getElementById('mc'));
}

function pickChoice(label,idx){
  selectedChoice=label;
  const choices=document.querySelectorAll('.eqt-choice');
  const colors=['#E1F5EE','#EEEDFE','#FAEEDA','#FAECE7'];
  const tcolors=['#085041','#3C3489','#633806','#712B13'];
  const bcolors=['#5DCAA5','#7F77DD','#EF9F27','#F0997B'];
  choices.forEach((el,i)=>{
    if(i===idx){
      el.classList.add('sel');
      el.style.background=colors[i];
      el.style.borderColor=bcolors[i];
      el.style.color=tcolors[i];
    } else {
      el.classList.remove('sel');
      el.style.background='';
      el.style.borderColor='';
      el.style.color='';
    }
  });
}

async function saveEmpathyQT(){
  const ch=selectedChoice||C.공감QT.find(r=>r.날짜===toStr()&&r.말씀구절===VERSES[currentVerseIdx].ref)?.선택;
  if(!ch){toast('먼저 보기를 선택해주세요');return;}
  const v=VERSES[currentVerseIdx];
  const comment=document.getElementById('eqt-comment').value.trim();
  const today=toStr();
  const record={날짜:today,말씀:v.text,말씀구절:v.ref,선택:ch,한마디:comment};

  const idx=C.공감QT.findIndex(r=>r.날짜===today&&r.말씀구절===v.ref);
  if(idx>=0)C.공감QT[idx]={...C.공감QT[idx],...record};
  else C.공감QT.push(record);

  // GAS 저장: [공감QT] 학생id | 이름 | 날짜 | 말씀 | 말씀구절 | 선택 | 한마디
  await gasPost({type:'공감QT',학생id:me.id,이름:me.이름,...record});
  selectedChoice=null;
  toast('공감 QT가 저장되었습니다 ✝️');
  sEmpathyQT(document.getElementById('mc'));
}

async function savePrayer3(shared) {

  const 간구 = document.getElementById('p3-간구').value.trim();
  if (!감사 && !고백 && !간구) { alert('한 줄이라도 작성해주세요 🙏'); return; }

  const today = toStr();
  const now   = new Date();
  const 시간  = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  const entry = { 날짜:today, 시간, 감사, 고백, 간구, 공유여부:shared };

  // 로컬 캐시
  const idx = C.삼줄기도.findIndex(r => r.날짜 === today);
  if (idx >= 0) Object.assign(C.삼줄기도[idx], entry);
  else C.삼줄기도.push(entry);

  // GAS 저장: [삼줄기도] 기도id | 학생id | 이름 | 날짜 | 시간 | 감사 | 고백 | 간구 | 공유여부
  await gasPost({ type:'삼줄기도', 학생id:me.id, 이름:me.이름, ...entry });

  toast(shared==='true' ? '기도가 교사에게 공유되었습니다 🕊️' : '기도가 저장되었습니다 🕊️');
  sPrayer3(document.getElementById('mc'));
}

// ════════════════════════════════════════════════════
async function tPrayer3(c) {
  c.innerHTML = '<div class="card"><div class="empty">데이터 불러오는 중...</div></div>';
  const [rows, students] = await Promise.all([gasGet('삼줄기도'), gasGet('학생목록')]);

  const today = toStr();
  const todayRows   = rows.filter(r => r.날짜 === today);
  const sharedRows  = rows.filter(r => r.공유여부 === 'true');
  const notToday    = students.filter(s => !todayRows.find(r => r.학생id === s.학생id));

  // 학생별 최신 기록
  const latestMap = {};
  rows.forEach(r => { if (!latestMap[r.학생id] || r.날짜 > latestMap[r.학생id].날짜) latestMap[r.학생id] = r; });
  const latestArr = Object.values(latestMap);

  // 간구 키워드 분석 (교사가 영성지도에 참고)
  const kwMap = { 감사:{}, 고백:{}, 간구:{} };
  const kwList = ['시험','공부','친구','가족','건강','기도','외로움','화','용기','평안','감사','이해','관계'];
  rows.forEach(r => {
    ['감사','고백','간구'].forEach(field => {
      const txt = r[field] || '';
      kwList.forEach(k => { if (txt.includes(k)) kwMap[field][k] = (kwMap[field][k]||0)+1; });
    });
  });
  const topKw = field => Object.entries(kwMap[field]).sort((a,b)=>b[1]-a[1]).slice(0,4);

  const icons = ['📖','🌱','⛰️','🌸','🌟','✝️'];

  c.innerHTML = `
  <div class="stat-grid">
    <div class="stat-box"><div class="stat-num">${rows.length}</div><div class="stat-lbl">총 기도 수</div></div>
    <div class="stat-box"><div class="stat-num">${todayRows.length}</div><div class="stat-lbl">오늘 기도</div></div>
    <div class="stat-box"><div class="stat-num">${sharedRows.length}</div><div class="stat-lbl">공유된 기도</div></div>
  </div>

  ${notToday.length ? `
  <div class="card">
    <div class="card-title">📋 오늘 기도 미기록 학생</div>
    <div class="kw-cloud">
      ${notToday.map(s=>`<span class="kw-chip kw-ask">${s.이름}</span>`).join('')}
    </div>
  </div>` : ''}

  <div class="card">
    <div class="card-title">🔍 기도 키워드 분석</div>
    <div style="font-size:12px;color:#888;margin-bottom:.75rem">학생들의 기도에서 자주 등장하는 단어예요. 영성지도 방향을 잡는 데 참고하세요.</div>
    ${[['감사','cat-thanks','kw-thanks'],['고백','cat-confess','kw-confess'],['간구','cat-ask','kw-ask']].map(([field,catCls,kwCls]) => `
    <div style="margin-bottom:.75rem">
      <div class="p3-saved-cat ${catCls}" style="margin-bottom:.35rem;font-size:11px">
        ${{감사:'🌿 감사',고백:'🙏 고백',간구:'⭐ 간구'}[field]}
      </div>
      <div class="kw-cloud">
        ${topKw(field).length
          ? topKw(field).map(([k,v])=>`<span class="kw-chip ${kwCls}">${k} <span style="opacity:.65">${v}회</span></span>`).join('')
          : '<span style="font-size:12px;color:#AAA">키워드 없음</span>'}
      </div>
    </div>`).join('')}
  </div>

  <div class="card">
    <div class="card-title">🕊️ 공유된 기도 (교사에게 나눈 기도)</div>
    ${sharedRows.length
      ? sharedRows.slice().reverse().slice(0,10).map((p,i) => `
        <div class="teacher-p3-item">
          <div class="tp3-head">
            <div class="tp3-av">${icons[i%6]}</div>
            <div>
              <div class="tp3-name">${p.이름}</div>
              <div class="tp3-date">${p.날짜}${p.시간?' · '+p.시간:''}${p.날짜===today?' · 오늘':''}</div>
            </div>
          </div>
          <div class="p3-saved-row"><span class="p3-saved-icon">🌿</span><div class="p3-saved-body"><div class="p3-saved-cat cat-thanks">감사</div><div class="p3-saved-text">${p.감사||'—'}</div></div></div>
          <div class="p3-saved-row" style="margin-top:.35rem"><span class="p3-saved-icon">🙏</span><div class="p3-saved-body"><div class="p3-saved-cat cat-confess">고백</div><div class="p3-saved-text">${p.고백||'—'}</div></div></div>
          <div class="p3-saved-row" style="margin-top:.35rem"><span class="p3-saved-icon">⭐</span><div class="p3-saved-body"><div class="p3-saved-cat cat-ask">간구</div><div class="p3-saved-text">${p.간구||'—'}</div></div></div>
        </div>`).join('')
      : '<div class="empty">아직 공유된 기도가 없어요</div>'}
  </div>

  <div class="card">
    <div class="card-title">👥 학생별 최근 기도</div>
    ${latestArr.length
      ? latestArr.map((p,i) => `
        <div class="teacher-p3-item">
          <div class="tp3-head">
            <div class="tp3-av">${icons[i%6]}</div>
            <div style="flex:1">
              <div class="tp3-name">${p.이름}</div>
              <div class="tp3-date">${p.날짜}${p.날짜===today?' · 오늘':''}</div>
            </div>
            <span class="p3-share-badge ${p.공유여부==='true'?'p3sb-on':'p3sb-off'}">${p.공유여부==='true'?'공유':'비공개'}</span>
          </div>
          <div class="p3-stat-mini">
            <div class="p3-sm"><div class="p3-sm-n">🌿</div><div class="p3-sm-l">감사 기록</div></div>
            <div class="p3-sm"><div class="p3-sm-n">🙏</div><div class="p3-sm-l">고백 기록</div></div>
            <div class="p3-sm"><div class="p3-sm-n">⭐</div><div class="p3-sm-l">간구 기록</div></div>
          </div>
          ${p.감사?'<div class="p3-saved-row"><span class="p3-saved-icon">🌿</span><div class="p3-saved-body"><div class="p3-saved-cat cat-thanks">감사</div><div class="p3-saved-text">'+p.감사+'</div></div></div>':''}
          ${p.고백?'<div class="p3-saved-row" style="margin-top:.3rem"><span class="p3-saved-icon">🙏</span><div class="p3-saved-body"><div class="p3-saved-cat cat-confess">고백</div><div class="p3-saved-text">'+p.고백+'</div></div></div>':''}
          ${p.간구?'<div class="p3-saved-row" style="margin-top:.3rem"><span class="p3-saved-icon">⭐</span><div class="p3-saved-body"><div class="p3-saved-cat cat-ask">간구</div><div class="p3-saved-text">'+p.간구+'</div></div></div>':''}
        </div>`).join('')
      : '<div class="empty">아직 기도 기록이 없어요</div>'}
  </div>`;
}

function sApply(c){c.innerHTML='<div class="verse-banner"><div class="verse-text">"너희 마음의 눈을 밝히사 그의 부르심의 소망이 무엇이며..."</div><div class="verse-ref">에베소서 1:18</div></div><div class="card"><div class="card-title">🏕️ 나의 결단</div><div class="card-sub">수련회에서 결단한 내용을 기록하고 매일 실천 여부를 체크하세요</div><div id="apply-list">'+renderApplyList()+'</div></div><div class="card"><div class="card-title">➕ 새 결단 추가</div><div class="form-row"><label>결단 내용</label><textarea id="new-apply-txt" placeholder="예) 매일 아침 5분 기도하기..."></textarea></div><button class="btn btn-green btn-full" onclick="addApply()">결단 추가 &amp; 저장</button></div>';}

async function saveQT(){const 날짜=document.getElementById('qt-날짜').value,말씀=document.getElementById('qt-말씀').value.trim(),묵상=document.getElementById('qt-묵상').value.trim(),적용=document.getElementById('qt-적용').value.trim();if(!말씀||!묵상){alert('말씀과 묵상 내용을 입력해주세요');return;}C.qt.push({날짜,말씀,묵상,적용});W[new Date().getDay()]=1;await gasPost({type:'QT',학생id:me.id,이름:me.이름,날짜,말씀,묵상,적용});toast('QT 기록이 저장되었습니다 📖');sQT(document.getElementById('mc'));}

  const latestArr=Object.values(latest);

  // 온도 1~2 (저온) 학생
  const cold=latestArr.filter(r=>+r.온도<=2);

  // 평균 온도
  const avg=latestArr.length?Math.round(latestArr.reduce((s,r)=>s+(+r.온도||0),0)/latestArr.length*10)/10:0;

  const tempBadge=v=>{
    const e=EMOJIS[Math.min(+v-1,4)];
    const cls=['tb1','tb2','tb3','tb4','tb5'][Math.min(+v-1,4)];
    return'<span class="temp-badge '+cls+'">'+e.em+' '+e.lv+'</span>';
  };

async function tDiary(c){

  const today=toStr();

  const notToday=students.filter(s=>!todayWriters.has(s.학생id));

  const latest={};
  rows.forEach(r=>{if(!latest[r.학생id]||r.날짜>latest[r.학생id].날짜)latest[r.학생id]=r;});

    <div style="display:flex;flex-wrap:wrap;gap:.4rem">

    </div>

  <div class="card">
    <div class="card-title">📔 학생별 최신 일기</div>

        </div>`).join('')

async function tMsg(c){
  c.innerHTML='<div class="card"><div class="empty">불러오는 중...</div></div>';
  const[students,msgs]=await Promise.all([gasGet('학생목록'),gasGet('메시지')]);
  const received=msgs.filter(m=>m.수신자==='교사').reverse();
  const sent=msgs.filter(m=>m.발신자==='교사').reverse();
  var convHtml='';
  if(received.length){
    received.forEach(function(m,idx){
      var myReplies=sent.filter(function(s){return s.수신자===m.발신자;});
      var lastReply=myReplies.length?myReplies[0]:null;
      convHtml+='<div style="border:1.5px solid var(--border);border-radius:14px;padding:.85rem;margin-bottom:.75rem;background:#fff">';
      convHtml+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem"><strong style="color:var(--g1)">'+m.발신자+'</strong><span style="font-size:10px;color:#aaa">'+(m.저장일시||'')+'</span></div>';
      convHtml+='<div style="background:#F0FDF4;border-radius:10px;padding:.6rem;font-size:13px;margin-bottom:.5rem">'+m.내용+'</div>';
      if(lastReply){
        convHtml+='<div style="background:#EDE9FE;border-radius:10px;padding:.6rem;font-size:12px;color:#6C3CE1;margin-bottom:.5rem"><strong>교사 답장:</strong> '+lastReply.내용+'</div>';
      }
      convHtml+='<div style="display:flex;gap:.4rem"><input type="text" id="reply-'+idx+'" placeholder="답장 입력..." style="flex:1;padding:.45rem .7rem;border:1.5px solid var(--border);border-radius:10px;font-size:12px"><button class="btn btn-green" style="font-size:11px;padding:.4rem .8rem" onclick="replyMsg(\''+m.발신자+'\','+idx+')">답장</button></div>';
      convHtml+='</div>';
    });
  }else{
    convHtml='<div class="empty">받은 메시지가 없어요</div>';
  }
  c.innerHTML='<div class="card"><div class="card-title">📨 학생 메시지 & 답장</div><div class="card-sub">학생이 보낸 메시지를 확인하고 답장하세요</div>'+convHtml+'</div>'
    +'<div class="card"><div class="card-title">💌 새 메시지 보내기</div><div class="form-row"><label>수신자</label><select id="msg-to"><option value="전체">전체 학생에게</option>'+students.map(s=>'<option value="'+s.이름+'">'+s.이름+' ('+s.학년+')</option>').join('')+'</select></div><div class="form-row"><label>내용</label><textarea id="teacher-msg" placeholder="학생에게 보낼 격려 메시지를 작성하세요..."></textarea></div><div style="margin-bottom:.75rem"><div class="section-label">빠른 템플릿</div><div style="display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.4rem"><button class="btn btn-sage" style="font-size:11px;padding:.3rem .65rem" onclick="setTpl(\'오늘 하루도 하나님과 동행하길 기도해요 🙏\')">격려</button><button class="btn btn-sage" style="font-size:11px;padding:.3rem .65rem" onclick="setTpl(\'기도 제목 잘 받았어요. 함께 기도할게요 ❤️\')">기도 응답</button><button class="btn btn-sage" style="font-size:11px;padding:.3rem .65rem" onclick="setTpl(\'하나님이 너를 사랑하신다는 것, 오늘도 잊지 말아요 ❤️\')">사랑</button></div></div><button class="btn btn-green btn-full" onclick="sendTeachMsg()">메시지 전송</button></div>';
}
async function replyMsg(studentName,idx){
  var input=document.getElementById('reply-'+idx);
  var txt=input.value.trim();
  if(!txt){alert('답장 내용을 입력해주세요');return;}
  await gasPost({type:'메시지',발신자:'교사',수신자:studentName,내용:txt});
  toast(studentName+'에게 답장을 보냈습니다 ✉️');
  input.value='';
  tMsg(document.getElementById('mc'));
}
function setTpl(t){document.getElementById('teacher-msg').value=t;}
async function sendTeachMsg(){const txt=document.getElementById('teacher-msg').value.trim();const to=document.getElementById('msg-to').value;if(!txt){alert('메시지를 작성해주세요');return;}await gasPost({type:'메시지',발신자:'교사',수신자:to,내용:txt});toast(to+'에게 메시지를 보냈습니다 ✉️');document.getElementById('teacher-msg').value='';tMsg(document.getElementById('mc'));}

// ════════════════════════════════════════════════════
async function tToday(c){
  c.innerHTML='<div class="card"><div class="empty">오늘의 기록을 불러오는 중...</div></div>';
  var results=await Promise.all([
    gasGet('학생목록'),gasGet('신앙온도'),gasGet('신앙일기'),
    gasGet('삼줄기도'),gasGet('공감QT'),gasGet('적용점'),
    gasGet('QT'),gasGet('기도제목'),gasGet('메시지')
  ]);
  var students=results[0],temp=results[1],diary=results[2],prayer3=results[3],
      empathy=results[4],apply=results[5],qt=results[6],pray=results[7],msgs=results[8];
  var today=toStr();
  var tT=temp.filter(r=>r.날짜===today);
  var tD=diary.filter(r=>r.날짜===today);
  var tP=prayer3.filter(r=>r.날짜===today);
  var tE=empathy.filter(r=>r.날짜===today);
  var tQ=qt.filter(r=>r.날짜===today);
  var tM=msgs.filter(m=>m.수신자==='교사').reverse().slice(0,5);
  var total=tT.length+tD.length+tP.length+tE.length+tQ.length;
  var activeIds=new Set([...tT,...tD,...tP,...tE,...tQ].map(r=>r.학생id));

  var h='<div class="card"><div class="card-title">📋 오늘의 기록</div><div class="card-sub">'+today+' 학생 활동 현황</div></div>';
  h+='<div class="stat-grid">';
  h+='<div class="stat-box"><div class="stat-num">'+activeIds.size+'/'+students.length+'</div><div class="stat-lbl">참여 학생</div></div>';
  h+='<div class="stat-box"><div class="stat-num">'+total+'</div><div class="stat-lbl">총 기록</div></div>';
  h+='<div class="stat-box"><div class="stat-num">'+tM.length+'</div><div class="stat-lbl">받은 메시지</div></div>';
  h+='</div>';

  var inactive=students.filter(s=>!activeIds.has(s.학생id));
  if(inactive.length&&students.length){
    h+='<div class="card"><div class="card-title" style="color:#EF4444">⚠️ 미참여 학생 ('+inactive.length+'명)</div>';
    h+=inactive.map(s=>'<span style="display:inline-block;background:#FEE2E2;color:#991B1B;font-size:12px;padding:.25rem .6rem;border-radius:8px;margin:.2rem">'+s.이름+' ('+s.학년+')</span>').join('');
    h+='</div>';
  }

  if(tT.length){
    var avg=Math.round(tT.reduce((s,r)=>s+(+r.온도||0),0)/tT.length*10)/10;
    h+='<div class="card"><div class="card-title">🌡️ 신앙 온도 ('+tT.length+'건, 평균 '+avg+')</div>';
    tT.forEach(r=>{h+='<div style="display:flex;justify-content:space-between;padding:.4rem 0;border-bottom:.5px solid var(--border);font-size:13px"><span><strong>'+r.이름+'</strong> '+r.이모지+' '+r.온도+'/5</span><span style="color:#888">'+(r.한마디||'')+'</span></div>';});
    h+='</div>';
  }
  if(tD.length){
    h+='<div class="card"><div class="card-title">📔 신앙 일기 ('+tD.length+'건)</div>';
    tD.forEach(r=>{
      h+='<div style="border:1px solid var(--border);border-radius:12px;padding:.7rem;margin-bottom:.5rem">';
      h+='<strong style="font-size:13px">'+r.이름+'</strong>';
      if(r.느낀순간)h+='<div style="font-size:12px;margin-top:.3rem">🌿 '+r.느낀순간+'</div>';
      if(r.고백)h+='<div style="font-size:12px;margin-top:.2rem">🙏 '+r.고백+'</div>';
      if(r.바라는것)h+='<div style="font-size:12px;margin-top:.2rem">⭐ '+r.바라는것+'</div>';
      h+='</div>';
    });
    h+='</div>';
  }
  if(tP.length){
    h+='<div class="card"><div class="card-title">🕊️ 3줄 기도 ('+tP.length+'건)</div>';
    tP.forEach(r=>{
      h+='<div style="border:1px solid var(--border);border-radius:12px;padding:.7rem;margin-bottom:.5rem">';
      h+='<strong style="font-size:13px">'+r.이름+'</strong>';
      if(r.감사)h+='<div style="font-size:12px;margin-top:.3rem">🌿 감사: '+r.감사+'</div>';
      if(r.고백)h+='<div style="font-size:12px;margin-top:.2rem">🙏 고백: '+r.고백+'</div>';
      if(r.간구)h+='<div style="font-size:12px;margin-top:.2rem">⭐ 간구: '+r.간구+'</div>';
      h+='</div>';
    });
    h+='</div>';
  }
  if(tE.length){
    h+='<div class="card"><div class="card-title">✝️ 공감QT ('+tE.length+'건)</div>';
    tE.forEach(r=>{
      h+='<div style="padding:.4rem 0;border-bottom:.5px solid var(--border);font-size:13px"><strong>'+r.이름+'</strong> '+(r.말씀구절||'')+' → '+(r.선택||'')+' <span style="color:#888">'+(r.한마디||'')+'</span></div>';
    });
    h+='</div>';
  }
  if(tQ.length){
    h+='<div class="card"><div class="card-title">📖 QT ('+tQ.length+'건)</div>';
    tQ.forEach(r=>{
      h+='<div style="border:1px solid var(--border);border-radius:12px;padding:.7rem;margin-bottom:.5rem">';
      h+='<strong style="font-size:13px">'+r.이름+'</strong> · '+(r.말씀||'');
      if(r.묵상)h+='<div style="font-size:12px;margin-top:.3rem">💭 '+r.묵상+'</div>';
      if(r.적용)h+='<div style="font-size:12px;margin-top:.2rem">→ '+r.적용+'</div>';
      h+='</div>';
    });
    h+='</div>';
  }

  if(total===0) h+='<div class="card"><div class="empty">오늘은 아직 기록이 없어요. 학생들이 활동하면 여기에 표시됩니다!</div></div>';
  c.innerHTML=h;
}

// ─── 공통 유틸 ─────────────────────────────────────
function toStr(){return new Date().toISOString().split('T')[0];}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);}
function showEl(id){const el=document.getElementById(id);el.style.display='flex';el.style.flexDirection='column';el.style.alignItems='center';el.style.justifyContent='center';}
function hide(id){document.getElementById(id).style.display='none';}
function goSplash(){['name-screen','pw-screen'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none';});document.getElementById('main-app').style.display='none';document.getElementById('splash').style.display='flex';role=null;me={이름:'',학년:'',id:''};selectedTemp=null;document.getElementById('rc-s').classList.remove('on');document.getElementById('rc-t').classList.remove('on');document.getElementById('sp-start').disabled=true;}
</script>

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
